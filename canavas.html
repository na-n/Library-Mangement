<!DOCTYPE HTML>
<html>
<head>
  <title>Canvas Example</title>
</head>
<body>
  <canvas id="myCanvas" width="400" height="250" style="border:4px solid black;">
  </canvas>
  <script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");
// Draw a blue rectangle
    ctx.fillStyle = "blue";
    ctx.fillRect(135, 50, 100, 60);
    // Add text
    ctx.font = "20px Arial";
    ctx.fillStyle = "green";
    ctx.fillText("Hello Canvas!", 120, 200);
  </script>
</body>
</html>

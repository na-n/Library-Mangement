<!DOCTYPE HTML>
<html>
<head>
 <title>Bird Sound Audio Example</title>
</head>
<body>
  <p>
Enjoy the relaxing real-time sound of birds chirping in the morning.
This audio will autoplay and repeat continuously.
</p>
<h2>Morning Birds Chirping Sound</h2>
<audio controls autoplay loop>
  <source src="birds-chirping.mp3" type="audio/mpeg">
  <source src="birds-chirping.ogg" type="audio/ogg">
  Your browser does not support the audio tag.
</audio>
</body>
</html>

<!DOCTYPE HTML>
<html>
<head>
 <title>adding text</title>
</head>
<body>
 <canvas id="myCanvas" width="300" 
  height="200" style="border:1px solid red;">
 </canvas>
 <script>
  var c = document.getElementById("myCanvas");
  var ctx = c.getContext("2d");
  ctx.font = "23px Arial";
  ctx.fillText("drawing",10,50);
  ctx.strokeText("text",170,100);
 </script>
</body>
</html>

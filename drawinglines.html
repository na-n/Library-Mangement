<!DOCTYPE HTML>
<html>
<head>
  <title>Drawing</title>
</head>
<body>
  <canvas id="myCanvas" width="300"
    height="200" style="border:1px solid red;">
  </canvas>
  <script>
    var c = document.getElementById("myCanvas");
    var ctx = c.getContext("2d");
    // Draw rectangle using lines
    ctx.moveTo(50, 50);
    ctx.lineTo(150, 50);
    ctx.lineTo(150, 120);
    ctx.lineTo(50, 120);
    ctx.lineTo(50, 50);
    ctx.stroke();
    // Draw triangle
    ctx.beginPath();
    ctx.moveTo(200, 50);
    ctx.lineTo(250, 120);
    ctx.lineTo(150, 120);
    ctx.closePath();
    ctx.stroke();
  </script>
</body>
</html>

<!DOCTYPE HTML>
<html>
<head>
  <title>Drawing Cricles</title>
</head>

<body>
  <canvas id="myCanvas" width="300" 
    height="200" style="border:1px solid red;">
  </canvas>

  <script>
    var c = document.getElementById("myCanvas");
    var ctx = c.getContext("2d");

    // First circle (only border)
    ctx.beginPath();
    ctx.arc(80, 80, 40, 0, 2 * Math.PI);
    ctx.stroke();

    // Second circle (filled color)
    ctx.beginPath();
    ctx.arc(200, 80, 40, 0, 2 * Math.PI);
    ctx.fillStyle = "blue";
    ctx.fill();
    ctx.stroke();
  </script>
</body>
</html>
